name: Flatpak reusable

on:
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
        default: lgx-flatpak-bundle
      bundle-name:
        required: false
        type: string
        default: lgx.flatpak
      retention-days:
        required: false
        type: number
        default: 14
    outputs:
      artifact-name:
        description: Uploaded artifact name
        value: ${{ jobs.flatpak.outputs.artifact-name }}
      bundle-name:
        description: Built Flatpak bundle filename
        value: ${{ jobs.flatpak.outputs.bundle-name }}

jobs:
  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact_name }}
      bundle-name: ${{ steps.meta.outputs.bundle_name }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set bundle metadata
        id: meta
        env:
          ARTIFACT_NAME: ${{ inputs.artifact-name }}
          BUNDLE_NAME: ${{ inputs.bundle-name }}
        run: |
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"
          echo "bundle_name=${BUNDLE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install flatpak and flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote (user)
        run: |
          flatpak remote-add --user --if-not-exists flathub \
            https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtime and SDK
        uses: actions/cache@v5
        with:
          path: ~/.local/share/flatpak
          key: flatpak-kde-6.9-${{ runner.os }}
          restore-keys: |
            flatpak-kde-6.9-

      - name: Install KDE Platform 6.9 and SDK
        run: |
          flatpak install --user -y --noninteractive flathub \
            org.kde.Platform//6.9 \
            org.kde.Sdk//6.9

      - name: Cache flatpak-builder state
        uses: actions/cache@v5
        with:
          path: .flatpak-builder
          key: flatpak-builder-${{ hashFiles('flatpak/eu.lastviking.lgx.yaml') }}-${{ github.sha }}
          restore-keys: |
            flatpak-builder-${{ hashFiles('flatpak/eu.lastviking.lgx.yaml') }}-

      - name: Build Flatpak bundle
        env:
          BUNDLE_NAME: ${{ steps.meta.outputs.bundle_name }}
        run: |
          flatpak-builder \
            --repo=repo \
            --force-clean \
            --default-branch=main \
            --user \
            builddir \
            flatpak/eu.lastviking.lgx.yaml
          flatpak build-bundle repo "${BUNDLE_NAME}" eu.lastviking.lgx main

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: ${{ steps.meta.outputs.bundle_name }}
          retention-days: ${{ inputs.retention-days }}
