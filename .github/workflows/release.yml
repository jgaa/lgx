name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  guard:
    name: Verify release tag
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      eligible: ${{ steps.guard.outputs.eligible }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag points to main
        id: guard
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main. Skipping release."
          fi

  flatpak:
    needs: guard
    if: needs.guard.outputs.eligible == 'true'
    uses: ./.github/workflows/flatpak-reusable.yml
    with:
      artifact-name: lgx-flatpak-release-${{ github.ref_name }}
      bundle-name: lgx-${{ github.ref_name }}.flatpak
      retention-days: 14

  release:
    name: Draft release from tag
    needs:
      - guard
      - flatpak
    if: needs.guard.outputs.eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        env:
          CURRENT_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          previous_tag="$(git tag --sort=-version:refname | grep -E '^v[0-9]' | grep -Fxv "$CURRENT_TAG" | head -n1 || true)"
          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${CURRENT_TAG}"
            compare_url="https://github.com/${REPOSITORY}/compare/${previous_tag}...${CURRENT_TAG}"
            intro="Changes since \`${previous_tag}\`."
          else
            commit_range="${CURRENT_TAG}"
            compare_url=""
            intro="Initial release."
          fi

          commits="$(git log --reverse --no-merges --pretty=format:'- %s (%h)' "$commit_range" || true)"
          if [ -z "$commits" ]; then
            commits="- No commits found in range."
          fi

          {
            echo "# ${CURRENT_TAG}"
            echo
            echo "_Draft release notes generated from commit history. Edit before publishing._"
            echo
            echo "${intro}"
            if [ -n "$compare_url" ]; then
              echo
              echo "Compare: ${compare_url}"
            fi
            echo
            echo "## Commits"
            echo
            printf '%s\n' "$commits"
          } > release-notes.md

      - name: Download Flatpak bundle
        id: download-flatpak
        uses: actions/download-artifact@v5
        with:
          name: ${{ needs.flatpak.outputs.artifact-name }}
          path: dist

      - name: Resolve Flatpak bundle path
        id: bundle
        env:
          EXPECTED_BUNDLE_NAME: ${{ needs.flatpak.outputs.bundle-name }}
        run: |
          bundle_path="$(find "${{ steps.download-flatpak.outputs.download-path }}" -type f -name "${EXPECTED_BUNDLE_NAME}" -print -quit)"
          if [ -z "$bundle_path" ]; then
            echo "Failed to find downloaded Flatpak bundle '${EXPECTED_BUNDLE_NAME}'." >&2
            find "${{ steps.download-flatpak.outputs.download-path }}" -maxdepth 3 -type f -print >&2 || true
            exit 1
          fi
          echo "path=${bundle_path}" >> "$GITHUB_OUTPUT"

      - name: Create or update draft release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = {
              "tag_name": os.environ["CURRENT_TAG"],
              "target_commitish": os.environ["GITHUB_SHA"],
              "name": os.environ["CURRENT_TAG"],
              "draft": False,
              "prerelease": True,
              "body": Path("release-notes.md").read_text(),
          }
          Path("release-payload.json").write_text(json.dumps(payload))
          PY

          release_id="$(gh api "repos/${REPOSITORY}/releases" --jq ".[] | select(.tag_name == \"${CURRENT_TAG}\" or .name == \"${CURRENT_TAG}\") | .id" | head -n1 || true)"
          if [ -n "${release_id}" ]; then
            release_id="$(gh api \
              --method PATCH \
              "repos/${REPOSITORY}/releases/${release_id}" \
              --input release-payload.json \
              --jq '.id')"
          else
            release_id="$(gh api \
              --method POST \
              "repos/${REPOSITORY}/releases" \
              --input release-payload.json \
              --jq '.id')"
          fi
          resolved_tag="$(gh api "repos/${REPOSITORY}/releases/${release_id}" --jq '.tag_name')"
          if [ "${resolved_tag}" != "${CURRENT_TAG}" ]; then
            echo "Release ${release_id} resolved to unexpected tag '${resolved_tag}' (expected '${CURRENT_TAG}')." >&2
            gh api "repos/${REPOSITORY}/releases/${release_id}" >&2 || true
            exit 1
          fi
          echo "id=${release_id}" >> "$GITHUB_OUTPUT"

      - name: Upload Flatpak to draft release
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          asset_name="${{ needs.flatpak.outputs.bundle-name }}"
          bundle_path="${{ steps.bundle.outputs.path }}"
          for attempt in 1 2 3 4 5; do
            if gh release upload "${CURRENT_TAG}" "${bundle_path}#${asset_name}" --repo "${GITHUB_REPOSITORY}" --clobber; then
              exit 0
            fi
            if [ "${attempt}" -eq 5 ]; then
              echo "Failed to upload release asset '${asset_name}' after ${attempt} attempts." >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Verify Flatpak asset on release
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          asset_name="${{ needs.flatpak.outputs.bundle-name }}"
          release_id="${{ steps.release.outputs.id }}"
          browser_url="$(gh api "repos/${REPOSITORY}/releases/${release_id}/assets" --jq ".[] | select(.name == \"${asset_name}\") | .browser_download_url" | head -n1 || true)"
          if [ -z "${browser_url}" ]; then
            echo "Flatpak asset '${asset_name}' was not attached to release '${CURRENT_TAG}'." >&2
            gh api "repos/${REPOSITORY}/releases/${release_id}/assets" >&2 || true
            exit 1
          fi
          echo "Attached Flatpak asset: ${browser_url}"
